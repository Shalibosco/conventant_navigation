name: covenant_navigation
description: Covenant University Campus Navigation App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_polyline_points: ^3.1.0

  geolocator: ^14.0.2
  geocoding: ^4.0.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  path_provider: ^2.1.4

  speech_to_text: ^7.4.0
  flutter_tts: ^4.0.2
  permission_handler: ^12.0.1

  provider: ^6.1.2
  get_it: ^9.2.1

  connectivity_plus: ^7.1.1
  http: ^1.2.2

  flutter_animate: ^4.5.0
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  intl: ^0.20.2
  sliding_up_panel: ^2.0.0+1
  lottie: ^3.3.3

  equatable: ^2.0.5
  logger: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#4B0082"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/Student-handbook-Feb-2020.pdf
    - assets/images/
    - assets/icons/
    - assets/map/
    - assets/lang/
