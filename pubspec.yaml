name: covenant_navigation
description: Covenant University Campus Navigation App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 🟢 ADD THIS LINE HERE:
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  flutter_polyline_points: ^2.1.0

  # --- Map & Navigation (Combined & De-duplicated) ---
  google_maps_flutter: ^2.12.1


  # --- Location ---
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # --- Offline / Local Storage ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # --- Voice (native) ---
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  permission_handler: ^11.3.1

  # --- State Management ---
  provider: ^6.1.2

  # --- Dependency Injection ---
  get_it: ^7.6.7

  # --- Networking ---
  connectivity_plus: ^6.0.0
  http: ^1.2.0

  # --- UI & UX ---
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: ^0.20.2
  sliding_up_panel: ^2.0.0+1
  lottie: ^3.1.0

  # --- Utils ---
  equatable: ^2.0.5
  logger: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  # ✅ Pro-Tip: Specify the directory to include all files inside automatically!
  assets:
    - assets/images/
    - assets/icons/
    - assets/map/
    - assets/lang/